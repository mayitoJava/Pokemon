<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Registro Poké</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- Fuente Retro -->
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

        <style>
            body {
                background: linear-gradient(135deg, #ff0000, #8b0000);
                font-family: 'Press Start 2P', cursive;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .pokedex-card {
                background: #f8f8f8;
                border: 8px solid #222;
                border-radius: 20px;
                padding: 40px;
                width: 100%;
                max-width: 500px;
                box-shadow: 0 0 30px rgba(0,0,0,0.8);
                position: relative;
            }

            .back-button {
                position: absolute;
                top: -25px;
                left: -25px;
                background: #00bfff;
                width: 60px;
                height: 60px;
                border-radius: 50%;
                border: 5px solid white;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 20px;
                text-decoration: none;
                color: black;
                transition: 0.3s;
            }

            .back-button:hover {
                background: #ffcc00;
                transform: scale(1.1);
            }

            .title {
                text-align: center;
                color: #ff0000;
                margin-bottom: 30px;
            }

            .form-control {
                border: 4px solid #222;
                border-radius: 10px;
                margin-bottom: 20px;
                font-size: 10px;
            }

            .btn-pokemon {
                background-color: #ffcc00;
                border: 4px solid #222;
                color: black;
                width: 100%;
                padding: 12px;
                transition: 0.3s;
                font-size: 10px;
            }

            .btn-pokemon:hover {
                background-color: #ff0000;
                color: white;
            }

            .footer-text {
                text-align: center;
                margin-top: 20px;
                font-size: 8px;
                color: black;
            }
        </style>
    </head>

    <body>

        <div class="pokedex-card">

            <!-- Botón regresar estilo Pokédex -->
            <a th:href="@{/Login}" class="back-button">
                ←
            </a>

            <h3 class="title">REGISTRO</h3>

            <form th:action="@{/registro}" method="post">

                <input type="text"
                       name="nombre"
                       class="form-control"
                       placeholder="NOMBRE"
                       required>

                <input type="email"
                       name="correo"
                       class="form-control"
                       placeholder="CORREO"
                       required>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="CONTRASEÑA"
                       required>

                <button type="submit" class="btn btn-pokemon">
                    CREAR CUENTA
                </button>

            </form>

            <div class="footer-text">
                © 2026 - PokéSystem
            </div>

        </div>

    </body>
</html>
