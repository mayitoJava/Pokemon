<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>PokéLogin</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- Fuente estilo retro -->
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

        <style>
            body {
                background: linear-gradient(135deg, #ff0000, #8b0000);
                font-family: 'Press Start 2P', cursive;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                color: white;
            }

            .pokedex-card {
                background: #f8f8f8;
                border: 8px solid #222;
                border-radius: 20px;
                padding: 40px;
                width: 100%;
                max-width: 500px;
                box-shadow: 0 0 30px rgba(0,0,0,0.8);
                position: relative;
            }

            .pokedex-card::before {
                content: "";
                width: 60px;
                height: 60px;
                background: #00bfff;
                border-radius: 50%;
                position: absolute;
                top: -30px;
                left: -30px;
                border: 5px solid white;
            }

            .title {
                text-align: center;
                color: #ff0000;
                margin-bottom: 30px;
            }

            .form-control {
                border: 4px solid #222;
                border-radius: 10px;
                margin-bottom: 20px;
                font-size: 12px;
            }

            .btn-pokemon {
                background-color: #ffcc00;
                border: 4px solid #222;
                color: black;
                width: 100%;
                padding: 12px;
                transition: 0.3s;
            }

            .btn-pokemon:hover {
                background-color: #ff0000;
                color: white;
            }

            .alert-retro {
                font-size: 10px;
                margin-top: 15px;
                padding: 10px;
                border: 3px solid black;
            }

            .footer-text {
                text-align: center;
                margin-top: 20px;
                font-size: 8px;
                color: black;
            }
        </style>
    </head>
    <body>

        <div class="pokedex-card">

            <h3 class="title">INICIAR SESIÓN</h3>

            <form th:action="@{/Login}" method="post">

                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="CORREO"
                       required/>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="CONTRASEÑA"
                       required/>

                <button type="submit" class="btn btn-pokemon">
                    ENTRAR
                </button>

                <div class="text-center mt-3">
                    <a th:href="@{/registro}" class="btn btn-dark w-100">
                        REGISTRARSE
                    </a>
                </div>

            </form>

            <!-- Error -->
            <div th:if="${param.error}" class="alert alert-danger alert-retro text-center">
                ⚠ CREDENCIALES INCORRECTAS
            </div>

            <!-- Logout -->
            <div th:if="${param.logout}" class="alert alert-success alert-retro text-center">
                ✔ SESIÓN CERRADA
            </div>

            <div class="footer-text">
                © 2026 - PokéSystem
            </div>

        </div>

    </body>
</html>
